name: Football Data Importer

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - leagues
          - phase2_priority
          - phase2
          - trophies
          - fixtures
          - status

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run importer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          DAILY_BUDGET: 72000
          API_DELAY_MS: 500
          JOB: ${{ github.event.inputs.job || 'auto' }}
        run: node importer.js
