name: Football Data Importer

on:
  schedule:
    # Runs every day at 01:00 UTC
    - cron: '0 1 * * *'
  # Allows manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - phase2
          - trophies
          - fixtures

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # just under GitHub's 6hr limit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run importer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          DAILY_BUDGET: 72000
          API_DELAY_MS: 500
          JOB: ${{ github.event.inputs.job || 'auto' }}
        run: node importer.js
